version: '3.8'

services:
  patdilet-web:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-patmac}/patdilet-web:latest
    container_name: patdilet-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # ZAI_API_KEY and ZAI_BASE_URL will be loaded from .env file

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 60 --cleanup
    restart: unless-stopped
